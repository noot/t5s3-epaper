[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor --chip esp32s3"


[env]
# default everything to info so the verbose esp dependencies (esp-rtos scheduler,
# esp-hal DMA, esp-radio, embedded-sdmmc) don't flood the serial port; keep this
# crate's own logs at debug. app examples log via println!, which always shows.
ESP_LOG = "info,lilygo_t5s3paperpro=debug"

[build]
rustflags = [
    "-C", "link-arg=-nostartfiles",
]

target = "xtensa-esp32s3-none-elf"

[unstable]
build-std = ["core", "alloc"]

[profile.release]
debug = true
