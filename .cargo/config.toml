[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Tlinkall.x"]

# esp-rtos defaults to a 100 Hz scheduler tick (10 ms slices). that's too coarse
# for the ble example: the esp-radio controller thread can't preempt often enough
# to service advertising events, so the board advertises sparsely and a scanner
# takes minutes to see it. 1000 Hz (1 ms) lets the radio thread run on time.
# this is an esp-config build-time setting read from the environment.
[env]
ESP_RTOS_CONFIG_TICK_RATE_HZ = "1000"

# the lora/display examples only need core, but the ble example pulls esp-radio's
# heap-backed stack (esp-alloc, allocator-api2), which requires the alloc crate.
[unstable]
build-std = ["core", "alloc"]
